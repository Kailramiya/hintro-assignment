version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: meeting_user
      POSTGRES_PASSWORD: meeting_pass
      POSTGRES_DB: meeting_intelligence
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U meeting_user -d meeting_intelligence']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://meeting_user:meeting_pass@postgres:5432/meeting_intelligence
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-Meeting Intelligence <noreply@example.com>}
      CANDIDATE_NAME: ${CANDIDATE_NAME:-Aman Kundu}
      CANDIDATE_EMAIL: ${CANDIDATE_EMAIL:-amankundu369@gmail.com}
      REPOSITORY_URL: ${REPOSITORY_URL:-}
      DEPLOYED_URL: ${DEPLOYED_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
